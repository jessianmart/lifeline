name: CI

# Roda a suíte a cada push/PR — pega drift (docs/testes/código) automaticamente.
# Os testes live (TestSupabaseLive) ficam em skip aqui: sem SUPABASE_* no ambiente.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (extras cloud + dev/pytest)
        run: pip install -e ".[cloud,dev]"
      - name: Testes
        run: python -m pytest -q
      - name: Integridade da line (reconstrói da view e verifica a cadeia real)
        run: |
          python -m lifeline migrate --from LIFELINE.md
          python -m lifeline verify
