# Render Blueprint — MCP remoto AUTHLESS (validação). Free tier (dorme após 15 min ocioso).
# Deploy: render.com → New → Blueprint → conecte o repo → ele lê este arquivo.
# Promover pra sempre-on depois: troque `plan: free` por `plan: starter` ($7/mês).
services:
  - type: web
    name: lifeline-mcp
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz      # GET 200 (sobe = saudável)
    autoDeploy: true               # redeploy a cada push na main
    # Authless (default): deixe SEM envVars → conector de 1 clique, line compartilhada.
    #
    # Multi-tenant (Authorization Server, #0049 — FEITO): defina no dashboard (NÃO comite segredo).
    # PUBLIC_URL e ALLOWED_HOSTS = a URL pública do serviço (ex.: lifeline-mcp.onrender.com).
    # envVars:
    #   - key: LIFELINE_OAUTH_AS           value: "1"
    #   - key: LIFELINE_STORE              value: supabase
    #   - key: LIFELINE_MCP_PUBLIC_URL     value: https://lifeline-mcp.onrender.com
    #   - key: LIFELINE_MCP_ALLOWED_HOSTS  value: lifeline-mcp.onrender.com
    #   - key: SUPABASE_URL                sync: false
    #   - key: SUPABASE_KEY                sync: false
